<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" sizes="48x48" type="image/png" href="/logo.png" />

    <!-- "block title" lets child templates override the page title.
         config.title comes from the "title" field in your config.toml.
         a blog post will show "Post Title | My Site" if the child sets the block,
         otherwise it falls back to just your site title. -->
    <title>{% block title %}{{ config.title }}{% endblock %}</title>

    <!-- static files live in the static/ folder at the root of your project.
         static/style.css is served at /style.css
         static/images/cat.png is served at /images/cat.png
         Zola copies everything in static/ to the output as-is, no processing. -->
    <link rel="stylesheet" href="/style.css?v=2">
</head>
<body>
<div id="container">

    <!-- topBar: put a marquee, a small image, or just some text here -->
            <div id="topBar"><marquee>Welcome to my domain. This is a site for putting out my things. Hope you enjoy your stay here!</marquee></div>

    <div id="headerArea">

        <!-- header: styled with a background image in the CSS.
             if you want actual img tags or text IN the header,
             add them directly inside this div! -->
        <div id="header"></div>

        <!-- navbar: add or remove li items to change your navigation links.
             for a simple site, hardcoding hrefs like below is totally fine.
             add more li items as you add more pages. -->
        <nav id="navbar" style="margin-bottom: 10px;">
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/blog">Blog</a></li>
                <li><a href="https://books.swornim.xyz">Books</a></li>
                <li><a href="https://sadgrl.online/resources/">Click Me!</a></li>
                <!-- add more links here as you need them -->
            </ul>
        </nav>

    </div>

    <div id="flex">

        <!-- leftSidebar: "block sidebar_left" lets child templates override this.
             put content directly here if you want it the same on every page,
             or leave the block empty and fill it in per-template. -->
            {% block sidebar_left %}
            <!-- default left sidebar content goes here -->
            {% endblock %}

        <!-- main content area: every template that extends base.html fills in
             "block content". the child template puts its page content here. -->
        <main>
            {% block content %}{% endblock %}
        </main>

        <!-- rightSidebar: same idea as leftSidebar but on the right.
             if you only want one sidebar, delete this aside and
             remove #rightSidebar styles from your CSS. -->
            {% block sidebar_right %}
            <!-- default right sidebar content goes here -->
            {% endblock %}

    </div>

    <!-- footer: now() | date(format="%Y") auto-updates the year so you never
         have to remember to change it. edit the text after the dash. -->
    <footer id="footer" style="margin-top: 10px;">
        {{ now() | date(format="%Y") }} — &copy; Swornim    </footer>

</div>
</body>
</html>
